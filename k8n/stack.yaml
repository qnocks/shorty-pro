              until nc -z analytics-postgres 5432; do sleep 2; done
              until nc -z kafka 9092; do sleep 2; done
      containers:
        - name: app
          image: shorty/analytics-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: POSTGRES_HOST
              value: analytics-postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: POSTGRES_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: KAFKA_CLICK_EVENTS_GROUP_ID
              value: analytics-service
            - name: KAFKA_CLICK_EVENTS_TOPIC
              value: url-click-events-topic
            - name: KAFKA_CLICK_EVENTS_DLT_TOPIC
              value: url-click-events-topic.dlt
            - name: OTEL_TRACES_EXPORTER
              value: none
            - name: OTEL_METRICS_EXPORTER
              value: none
            - name: OTEL_LOGS_EXPORTER
              value: none
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 90
