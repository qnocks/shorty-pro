server:
  port: 8081

logging:
  level:
    com.qnocks.analytics_service: DEBUG

spring:
  application:
    name: analytics-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5435}/analytics
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASS:root}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: 20000
  jpa:
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      group-id: ${app.kafka.topics.url-click-events.group-id}
      auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET:earliest}
      enable-auto-commit: false
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "shorty.shared"
        spring.json.value.default.type: shorty.shared.UrlClickEvent
        spring.json.use.type.headers: false
    listener:
      ack-mode: record
      missing-topics-fatal: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger
    enabled: true
  api-docs:
    path: /api-docs
    enabled: true
    syntax-highlight:
      activated: true

app:
  openapi:
    title: Analytics Service
    version: 1.0.0
    description: Analytics Service
    contact-name: qnocks
    contact-email: qnocks@qnocks.com
  exception:
    trace: true
  kafka:
    topics:
      url-click-events:
        name: ${KAFKA_CLICK_EVENTS_TOPIC:url-click-events-topic}
        group-id: ${KAFKA_CLICK_EVENTS_GROUP_ID:analytics-service}
        dlt-name: ${KAFKA_CLICK_EVENTS_DLT_TOPIC:url-click-events-topic.dlt}
        partitions: ${KAFKA_CLICK_EVENTS_PARTITIONS:3}
        replicas: ${KAFKA_CLICK_EVENTS_REPLICAS:1}
